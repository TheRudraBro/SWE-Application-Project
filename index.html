<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="images/jpg" href="Assets/TB-logo-removebg-preview.png">
  <!-- Tailwind + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <title>Tourism Bangladesh | Login</title>
</head>

<body class="min-h-screen bg-[url('./Images/bandarban.png')] bg-cover bg-center flex items-center justify-center">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/50"></div>

  <!-- Login Card -->
  <div class="relative z-10 w-[90%] max-w-md backdrop-blur-xl bg-white/20
              border border-white/30 rounded-3xl shadow-2xl">

    <!-- Header -->
    <div class="h-32 bg-[url('./Images/bg.png')] bg-cover bg-center flex items-center justify-center">
      <h1 class="text-2xl font-extrabold text-white text-center">
        Welcome to <br> Tourism Bangladesh
      </h1>
    </div>

    <!-- Form -->
    <form class="p-8">

      <!-- Email -->
<!-- Email -->
<div class="mb-4">
  <label class="font-semibold text-white">Email Address</label>
  <input
    type="email"
    placeholder="Enter your email address"
    class="input input-bordered w-full bg-[#f4f5f7] mt-2 rounded-3xl"
    id="email"
  />
</div>

<!-- Password -->
<div class="mb-6">
  <label class="font-semibold text-white">Password</label>
  <input
    type="password"
    placeholder="Enter password"
    class="input input-bordered w-full bg-[#f4f5f7] mt-2 rounded-3xl"
    id="password"
  />
</div>

<!-- Button -->
<button
  class="btn w-full rounded-3xl bg-green-600 hover:bg-green-700 text-white font-semibold"
  id="loginButton">
  Login
</button>

<!-- Create account -->
<p class="text-sm text-center text-gray-300 mt-4">
  New here?
  <a href="register.html"
     class="text-green-500 font-medium hover:underline">
     Create an account
  </a>
</p>

    </form>
  </div>
<!-- firebase  -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCriaPq2KbtuPZtMtuHQhLH7zWUTjwMOfQ",
  authDomain: "tourism-bangladesh-official.firebaseapp.com",
  databaseURL: "https://tourism-bangladesh-official-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tourism-bangladesh-official",
  storageBucket: "tourism-bangladesh-official.firebasestorage.app",
  messagingSenderId: "900176892229",
  appId: "1:900176892229:web:dbf383a38895f9337eee2c",
  measurementId: "G-5FYLYPQ8B6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ LOGIN ONLY
document.getElementById("loginButton").addEventListener("click", function (e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("❌ Please fill all fields");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      const user = userCredential.user;

      if (user.emailVerified) {
        alert("✅ Login Successful!");
        window.location.href = "Home.html";
      } else {
        alert("❌ Please verify your email first!");
      }
    })
    .catch(() => {
      alert("❌ Invalid email or password");
    });
});
</script>
 <script src="LoginPage/script.js"></script>
</body>
</html>
