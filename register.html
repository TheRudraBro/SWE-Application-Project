<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="images/jpg" href="Assets/TB-logo-removebg-preview.png">

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <title>Tourism Bangladesh | Register</title>
</head>

<body class="min-h-screen bg-[url('./Images/sylhet.png')] bg-cover bg-center flex items-center justify-center">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/50"></div>

  <div class="relative z-10 bg-white/20 p-8 rounded-xl w-96">
    <h2 class="text-2xl font-bold mb-4 text-center text-white">Create Account</h2>

    <!-- Name -->
    <input type="text" id="name" placeholder="Full Name"
      class="input input-bordered w-full mb-3 bg-white/40 text-white font-medium">

    <!-- Phone -->
    <input type="text" id="phone" placeholder="Phone Number"
      class="input input-bordered w-full mb-3 bg-white/40 text-white font-medium">

    <!-- Email -->
    <input type="email" id="email" placeholder="Email"
      class="input input-bordered w-full mb-3 bg-white/40 text-white font-medium">

    <!-- Password -->
    <input type="password" id="password" placeholder="Password"
      class="input input-bordered w-full mb-3 bg-white/40 text-white font-medium">

    <button onclick="register()"
      class="btn bg-green-600 text-white w-full">
      Register
    </button>

    <p class="text-sm mt-3 text-center text-white">
      Already have account?
      <a href="index.html" class="text-green-500 font-medium">Login</a>
    </p>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCriaPq2KbtuPZtMtuHQhLH7zWUTjwMOfQ",
  authDomain: "tourism-bangladesh-official.firebaseapp.com",
  databaseURL: "https://tourism-bangladesh-official-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tourism-bangladesh-official",
  storageBucket: "tourism-bangladesh-official.firebasestorage.app",
  messagingSenderId: "900176892229",
  appId: "1:900176892229:web:dbf383a38895f9337eee2c",
  measurementId: "G-5FYLYPQ8B6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Password validation
function validatePassword(password) {
  const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;
  return regex.test(password);
}

// Register
window.register = function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  // Email validation
  if (!email.includes("@") || !email.includes(".")) {
    alert("❌ Invalid email format");
    return;
  }

  // Password validation
  if (!validatePassword(password)) {
    alert("Password must contain 8 characters and minimum 1 Uppercase 1 Lowercase 1 Number 1 Special character");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      const user = userCredential.user;

      // Send verification email
      sendEmailVerification(user)
        .then(() => {
          alert("📧 Verification email sent! Check your inbox.");
          window.location.href = "index.html";
        });
    })
    .catch((error) => {
      alert("❌ " + error.message);
    });
};
</script>

</body>
</html>
